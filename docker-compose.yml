version: "3.9"

services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - LLM_PROVIDER=${LLM_PROVIDER:-openai}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-sk-placeholder}
      - OPENSEARCH_HOST=opensearch
      - ROSIE_CACHE_DIR=/app/cache
    volumes:
      - rosie-cache:/app/cache
    depends_on:
      - opensearch

  ui:
    build: .
    command: streamlit run rosie/ui/app.py --server.port=8501 --server.address=0.0.0.0
    ports:
      - "8501:8501"
    environment:
      - ROSIE_API_BASE=http://api:8000
    depends_on:
      - api

  opensearch:
    image: opensearchproject/opensearch:2.13.0
    environment:
      - discovery.type=single-node
      - DISABLE_SECURITY_PLUGIN=true
      - OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
    volumes:
      - opensearch-data:/usr/share/opensearch/data

volumes:
  rosie-cache:
  opensearch-data:
